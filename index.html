
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALYS Alimentos - Portal de Citas de Proveedores</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .header {
            background: #2E7D32;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .header h1 {
            font-size: 32px;
        }

        .header p {
            margin-top: 10px;
            font-size: 16px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2E7D32;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            font-size: 16px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1B5E20;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>ALYS Alimentos</h1>
        <p>Portal de Citas de Proveedores</p>
    </div>

    <div class="container">

        <div class="card">

            <h2>Agendar Cita</h2>

            <label>Número de Proveedor</label>
            <input type="text" id="NumeroProveedor">

            <label>Correo Electrónico</label>
            <input type="email" id="CorreoProveedor">

            <label>Orden de Compra</label>
            <input type="text" id="OrdenCompra">

            <label>Cantidad de Tarimas</label>
            <input type="number" id="CantidadTarimas">

            <label>Observaciones</label>
            <textarea id="Observaciones"></textarea>

            <label>Ubicación</label>
            <select id="Ubicacion">
                <option value="">Seleccione</option>
                <option value="CEDIS">CEDIS</option>
                <option value="PLANTA">PLANTA</option>
            </select>

            <label>Fecha de Cita</label>
            <input type="date" id="Fecha">

            <label>Hora Disponible</label>
            <select id="Hora">
                <option value="">Seleccione</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
            </select>

            <button onclick="agendarCita()">
                Agendar Cita
            </button>

        </div>

    </div>

    <div class="footer">
        ALYS Alimentos © 2026
    </div>

    <script>

        async function agendarCita() {

            
const datos = {
    NumeroProveedor: document.getElementById("NumeroProveedor").value,
    CorreoProveedor: document.getElementById("CorreoProveedor").value,
    OrdenCompra: document.getElementById("OrdenCompra").value,
    CantidadTarimas: parseInt(document.getElementById("CantidadTarimas").value),
    Observaciones: document.getElementById("Observaciones").value,
    Ubicacion: document.getElementById("Ubicacion").value,
    Fecha: document.getElementById("Fecha").value,
    Hora: document.getElementById("Hora").value
};


            if (
                !datos.NumeroProveedor ||
                !datos.CorreoProveedor ||
                !datos.OrdenCompra ||
                !datos.CantidadTarimas ||
                !datos.Ubicacion ||
                !datos.Fecha ||
                !datos.Hora
            ) {
                alert("Complete todos los campos obligatorios.");
                return;
            }

            try {

                const respuesta = await fetch(
                    "https://default1b4190e98a5241f39ace2f9b4e7419.08.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/03/workflows/b7eb7273214849b390c4a73ed496d4cd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Trwks-29jSbsLXwYco-Xn7ZmMu7F61hBvO03lruuZU4",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(datos)
                    }
                );

                if (respuesta.ok) {

                    alert("✅ Cita registrada correctamente.");

                    document.getElementById("NumeroProveedor").value = "";
                    document.getElementById("CorreoProveedor").value = "";
                    document.getElementById("OrdenCompra").value = "";
                    document.getElementById("CantidadTarimas").value = "";
                    document.getElementById("Observaciones").value = "";
                    document.getElementById("Ubicacion").value = "";
                    document.getElementById("Fecha").value = "";
                    document.getElementById("Hora").value = "";

                } else {

                    alert("❌ Error al registrar la cita.");

                }

            } catch (error) {

                console.error(error);
                alert("❌ Error al conectar con el servidor.");

            }

        }

    </script>

</body>

</html>
