
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALYS Alimentos - Portal de Citas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
}

.header{
    background:#2E7D32;
    color:white;
    text-align:center;
    padding:30px;
}

.logo{
    max-width:220px;
    background:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    background:#2E7D32;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1B5E20;
}

.footer{
    text-align:center;
    padding:30px;
    color:#666;
}

</style>
</head>

<body>

<div class="header">

<h1>ALYS Alimentos</h1>
<p>Portal de Citas de Proveedores</p>

</div>

<div class="container">

<div class="card">

<h2>Agendar Cita</h2>

<label>Número de Proveedor</label>
<input
    type="text"
    id="NumeroProveedor"
    onblur="buscarProveedor()"
>

<label>Empresa</label>
<input
    type="text"
    id="NombreEmpresa"
    readonly
>

<label>Correo Electrónico</label>
<input type="email" id="CorreoProveedor">

<label>Orden de Compra</label>
<input type="text" id="OrdenCompra">

<label>Cantidad de Tarimas</label>
<input type="number" id="CantidadTarimas">

<label>Observaciones</label>
<textarea id="Observaciones"></textarea>

<label>Ubicación</label>
<select id="Ubicacion" onchange="actualizarHorarios()">
    <option value="">Seleccione</option>
    <option value="CEDIS">CEDIS</option>
    <option value="PLANTA">PLANTA</option>
</select>

<label>Fecha de Cita</label>
<input type="date" id="Fecha" onchange="actualizarHorarios()">

<label>Hora Disponible</label>

<select id="Hora">

<option value="">Seleccione</option>

</select>

<button onclick="agendarCita()">
Agendar Cita
</button>
    
<div
    id="mensaje"
    style="
        margin-top:20px;
        text-align:center;
        font-weight:bold;
        color:#2E7D32;
    ">
</div>

</div>

</div>

</div>

<div class="footer">
ALYS Alimentos © 2026
</div>

<script>

const URL_AGENDAR =
"https://default1b4190e98a5241f39ace2f9b4e7419.08.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/03/workflows/b7eb7273214849b390c4a73ed496d4cd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Trwks-29jSbsLXwYco-Xn7ZmMu7F61hBvO03lruuZU4";

const URL_PROVEEDOR =
"https://default1b4190e98a5241f39ace2f9b4e7419.08.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/05/workflows/337d6814d0404fcda35554e8a42b1ef0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=-V2xuFKYi3vLNEJmn-HxZVgPTgdYTxIWdjsLfWPqHPQ";

function actualizarHorarios() {

    const ubicacion =
        document.getElementById("Ubicacion").value;

    const fecha =
        document.getElementById("Fecha").value;

    const combo =
        document.getElementById("Hora");

    combo.innerHTML =
        '<option value="">Seleccione</option>';

    if (!ubicacion || !fecha) return;

    
const dia =
    new Date(fecha)
        .toLocaleDateString(
            "es-MX",
            { weekday: "long" }
        )
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");


    let horarios = [];

    if (ubicacion === "CEDIS") {

        if (
            dia === "lunes" ||
            dia === "martes" ||
            dia === "viernes"
        ) {

            horarios = [
                "11:00",
                "11:30",
                "12:00",
                "12:30",
                "13:00",
                "13:30",
                "15:00",
                "15:30",
                "16:00",
                "16:30"
            ];

        }
        else if (dia === "miercoles") {

            horarios = [
                "11:00",
                "11:30",
                "12:00",
                "12:30",
                "13:00",
                "13:30"
            ];

        }
        else {

            alert(
                "CEDIS solo permite citas lunes, martes, miércoles y viernes."
            );

            document.getElementById("Fecha").value = "";

            return;
        }
    }

    if (ubicacion === "PLANTA") {

        if (
            dia === "lunes" ||
            dia === "martes" ||
            dia === "miercoles"
        ) {

            horarios = [
                "11:00",
                "12:00",
                "13:00"
            ];

        }
        else {

            alert(
                "PLANTA solo permite citas lunes, martes y miércoles."
            );

            document.getElementById("Fecha").value = "";

            return;
        }
    }

    horarios.forEach(hora => {

        let option =
            document.createElement("option");

        option.value = hora;
        option.text = hora;

        combo.appendChild(option);

    });

}
 
window.onload = function() {

    const fechaInput =
        document.getElementById("Fecha");

    let minimo = new Date();

    minimo.setDate(
        minimo.getDate() + 2
    );

    fechaInput.min =
        minimo.toISOString()
              .split("T")[0];

};   

async function buscarProveedor(){

    const numero =
        document.getElementById(
            "NumeroProveedor"
        ).value;

    if(!numero) return;

    try{

        const respuesta = await fetch(
            URL_PROVEEDOR,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    NumeroProveedor:numero
                })
            }
        );

        const data =
            await respuesta.json();

        console.log(data);

        if(
            data.value &&
            data.value.length > 0
        ){

            document.getElementById(
                "NombreEmpresa"
            ).value =
                data.value[0].NombreProveedor ||
                "Proveedor encontrado";

        }
        else{

            document.getElementById(
                "NombreEmpresa"
            ).value =
                "Proveedor no encontrado";

        }

    }
    catch(error){

        console.error(error);

        document.getElementById(
            "NombreEmpresa"
        ).value =
            "Error al consultar";

    }

}

async function agendarCita(){

    const datos = {

        NumeroProveedor:
            document.getElementById("NumeroProveedor").value,

        NombreEmpresa:
            document.getElementById("NombreEmpresa").value,

        CorreoProveedor:
            document.getElementById("CorreoProveedor").value,

        OrdenCompra:
            document.getElementById("OrdenCompra").value,

        CantidadTarimas:
            parseInt(
                document.getElementById(
                    "CantidadTarimas"
                ).value
            ),

        Observaciones:
            document.getElementById(
                "Observaciones"
            ).value,

        Ubicacion:
            document.getElementById(
                "Ubicacion"
            ).value,

        Fecha:
            document.getElementById(
                "Fecha"
            ).value,

        Hora:
            document.getElementById(
                "Hora"
            ).value

    };

    if(
        !datos.NumeroProveedor ||
        !datos.CorreoProveedor ||
        !datos.OrdenCompra ||
        !datos.CantidadTarimas ||
        !datos.Ubicacion ||
        !datos.Fecha ||
        !datos.Hora
    ){
        alert(
            "Complete todos los campos obligatorios."
        );
        return;
    }

    try{

        const respuesta =
            await fetch(
                URL_AGENDAR,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify(datos)
                }
            );


if(respuesta.ok){

    document.getElementById("mensaje").innerHTML =
    "✅ Su cita fue registrada exitosamente. En breve recibirá un correo de confirmación.";

    document.getElementById("NumeroProveedor").value = "";
    document.getElementById("NombreEmpresa").value = "";
    document.getElementById("CorreoProveedor").value = "";
    document.getElementById("OrdenCompra").value = "";
    document.getElementById("CantidadTarimas").value = "";
    document.getElementById("Observaciones").value = "";
    document.getElementById("Ubicacion").value = "";
    document.getElementById("Fecha").value = "";
    document.getElementById("Hora").value = "";

 window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
    
}


        else{

            alert(
                "❌ Error al registrar la cita."
            );

        }

    }
    catch(error){

        console.error(error);

        alert(
            "❌ Error al conectar con el servidor."
        );

    }

}

</script>

</body>
</html>
